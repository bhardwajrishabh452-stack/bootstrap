
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Hero Layout</title>
 
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    .hero {
      padding: 4rem 0;
    }
    .hero-img {
      max-width: 100%;
      height: auto;
      object-fit: cover;
    }
    .projects-grid img {
      width: 100%;
      height: auto;
      object-fit: cover;
    }
    .footer-logos {
      background-color: #222;
      color: white;
      padding: 2rem 0;
    }
    .footer-logos img {
      max-height: 50px;
      margin: 0.5rem;
    }
  </style>
</head>
<body>


  <section class="hero">
    <div class="container">
      <div class="row align-items-center">
        <!-- Left: image -->
        <div class="col-lg-6 mb-4 mb-lg-0">
          <img src="images/men.jpg" alt="Profile" class="hero-img rounded" />
        </div>
       
        <div class="col-lg-6">
          <h1>Hello, I'm <strong>Your Name</strong>.</h1>
          <p class="lead">UI/UX Designer & Frontend Developer from City, Country.</p>
          <a href="#portfolio" class="btn btn-primary btn-lg">Check Portfolio</a>
        </div>
      </div>
    </div>
  </section>

  <section id="portfolio" class="py-5">
    <div class="container">
      <div class="row g-3 projects-grid">
        <div class="col-md-4">
          <img src="images/whatch.jpg" alt="Project 1" class="rounded">
        </div>
        <div class="col-md-4">
          <img src="images/box.jpeg" alt="Project 2" class="rounded">
        </div>
        <div class="col-md-4">
          <img src="images/alexa.jpg" alt="Project 3" class="rounded">
        </div>
     
      </div>
    </div>
  </section>

  
  <section class="footer-logos text-center">
    <div class="container">
      <div class="d-flex justify-content-center align-items-center flex-wrap">
        <img src="" alt="MailChimp">
        <img src="images/Campaign Monitor logo.jpeg" alt="Campaign Monitor">
        <img src="images/GetResponselogo.png" alt="GetResponse">
        <img src="activecampaign-logo.png" alt="ActiveCampaign">
        <img src="aweber-logo.png" alt="AWeber">
      </div>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
